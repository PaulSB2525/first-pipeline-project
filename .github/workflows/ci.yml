name: CI Pipeline
on:
  push:
    branches:
      - main
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install
        run: npm install
      - name: Test
        run: npm test
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: pasb-first-pipeline
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}